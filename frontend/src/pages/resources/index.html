<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources Tab - Pop Up</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <div class="primaryInfo">
        <div class="xButton">
            <span class="material-symbols-outlined">
                close
            </span>
        </div>

        <div class="className">
            Class Name
        </div>
        <div class="classCode">
            ABC1234
        </div>
        <div class="professorName">
            Dr.ProfessorName
        </div>

        <div class="divider"></div>

        <div class="documentSection">
            <div class="bar1">
                Documents
            </div>

            <div class="docOptions">
                <div class="doc1"></div>

                <div class="doc2"></div>
                
                <div class="doc3"></div>
            </div>
        </div>

        <div clas="videoSection">
            <div class="bar2">
                Videos
            </div>

            <div class="videoOptions">
                <div class="video1"></div>

                <div class="video2"></div>

                <div class="video3"></div>
            </div>
        </div>
    </div>
</body>
</html>
